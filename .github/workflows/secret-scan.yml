name: Secret Scan

# Fails any push/PR that introduces a REAL credential into the repo.
# Two passes:
#   1. Full-tree scan of every tracked (non-vendored) file.
#   2. Diff scan of changes vs the base branch (catches re-introduction of a
#      token that may already live in history).
# Placeholders (PASTE_YOUR_TOKEN_HERE, CHANGE_ME, CHANGE_ME_VIA_ENV, the
# literal verify-token string) are intentionally NOT matched.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan tracked files for leaked secrets
        run: |
          set -euo pipefail
          PATTERNS=(
            'cfat_[A-Za-z0-9]{20,}'        # Cloudflare API token
            'EAA[A-Za-z0-9_-]{20,}'        # Meta / WhatsApp long-lived token
            'ghp_[A-Za-z0-9]{20,}'         # GitHub PAT
            'github_pat_[A-Za-z0-9_]{20,}' # GitHub fine-grained PAT
            'glpat-[A-Za-z0-9_-]{20,}'     # GitLab PAT
            'AKIA[0-9A-Z]{16}'             # AWS access key id
            'xox[baprs]-[A-Za-z0-9-]{10,}' # Slack token
            'AIza[0-9A-Za-z_-]{35}'        # Google API key
            'sk-[A-Za-z0-9]{32,}'          # OpenAI / generic secret key
            'sk_live_[A-Za-z0-9]+'         # Stripe live secret key
            'AC[0-9a-z]{32}'               # Twilio account SID
            '-----BEGIN (RSA |EC )?PRIVATE KEY-----' # Private key material
          )
          RE=$(IFS='|'; echo "${PATTERNS[*]}")

          echo "== Pass 1: full-tree scan of tracked files (excluding node_modules) =="
          failures=0
          while IFS= read -r f; do
            case "$f" in node_modules/*|*/node_modules/*) continue;; esac
            if grep -Eqn "$RE" "$f"; then
              echo "::error file=$f::Potential secret detected (full-tree)"
              grep -En "$RE" "$f" | sed 's/^/    /'
              failures=1
            fi
          done < <(git ls-files)

          echo "== Pass 2: scan changed lines vs origin/main =="
          # Base ref for PRs is github.base_ref; for push use origin/main.
          BASE="${{ github.event.pull_request.base.ref && format('origin/{0}', github.event.pull_request.base.ref) || 'origin/main' }}"
          git fetch -q origin "${BASE#origin/}" || true
          if git rev-parse --quiet --verify "$BASE" >/dev/null; then
            while IFS= read -r line; do
              if printf '%s\n' "$line" | grep -Eq "$RE"; then
                echo "::error::Potential secret in diff vs $BASE:"
                echo "    $line"
                failures=1
              fi
            done < <(git diff "$BASE" -- ':(exclude)node_modules' ':(exclude)*/node_modules' | grep '^+' | grep -v '^+++')
          else
            echo "Base $BASE not resolvable; skipping diff scan (full-tree scan still enforced)."
          fi

          if [ "$failures" -ne 0 ]; then
            echo "Secret scan FAILED. Remove the leaked credential and load it from env instead."
            exit 1
          fi
          echo "Secret scan passed."
