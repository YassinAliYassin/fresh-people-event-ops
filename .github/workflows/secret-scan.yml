name: Secret Scan

# Fail any push/PR that introduces a REAL credential into the repo.
# Placeholders (PASTE_YOUR_TOKEN_HERE, CHANGE_ME, CHANGE_ME_VIA_ENV) are
# intentionally NOT matched, so documentation/examples stay clean.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan tracked files for leaked secrets
        run: |
          set -euo pipefail
          PATTERNS=(
            'cfat_[A-Za-z0-9]{20,}'        # Cloudflare API token
            'EAA[A-Za-z0-9_-]{20,}'        # Meta / WhatsApp long-lived token
            'ghp_[A-Za-z0-9]{20,}'         # GitHub PAT
            'glpat-[A-Za-z0-9_-]{20,}'     # GitLab PAT
            'AKIA[0-9A-Z]{16}'             # AWS access key id
            'xox[baprs]-[A-Za-z0-9-]{10,}' # Slack token
            'AIza[0-9A-Za-z_-]{35}'        # Google API key
          )
          RE=$(IFS='|'; echo "${PATTERNS[*]}")

          echo "Scanning tracked files (excluding node_modules) for secret patterns..."
          matches=0
          while IFS= read -r f; do
            case "$f" in
              node_modules/*|*/node_modules/*) continue ;;
            esac
            if grep -Eqn "$RE" "$f"; then
              echo "::error file=$f::Potential secret detected"
              grep -En "$RE" "$f" | sed 's/^/    /'
              matches=1
            fi
          done < <(git ls-files)

          if [ "$matches" -ne 0 ]; then
            echo "Secret scan FAILED. Remove the leaked credential and load it from env instead."
            exit 1
          fi
          echo "Secret scan passed."
