<!DOCTYPE html>
<html>
<head>
    <title>Fresh People - Quick Book</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            background: #FBFBF9; 
            color: #0A0A0A;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { 
            color: #A4C71D; 
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle { 
            color: #666; 
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #A4C71D;
        }
        textarea {
            height: 120px;
            resize: vertical;
            font-family: 'Courier New', monospace;
        }
        button { 
            background: #A4C71D; 
            color: white; 
            padding: 15px 40px; 
            border: none; 
            cursor: pointer; 
            font-size: 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }
        button:hover { 
            background: #8FB018;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>🎉 Fresh People</h1>
    <p class="subtitle">Quick Event Booking - Auto-sends WhatsApp confirmation</p>
    
    <form id="bookingForm">
        <div class="form-group">
            <label>Event Type *</label>
            <input type="text" id="event" placeholder="e.g., Wedding Reception, Corporate Gala" required>
        </div>
        
        <div class="form-group">
            <label>Client Name *</label>
            <input type="text" id="client" placeholder="e.g., Sarah & John" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Date *</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>Time *</label>
                <input type="time" id="time" value="18:00" required>
            </div>
        </div>
        
        <div class="form-group">
            <label>Location *</label>
            <input type="text" id="location" placeholder="e.g., Meikles Hotel, Royal Harare" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Staff Required</label>
                <select id="staffRequired">
                    <option value="2">2 Staff</option>
                    <option value="3">3 Staff</option>
                    <option value="4" selected>4 Staff</option>
                    <option value="5">5 Staff</option>
                    <option value="6">6 Staff</option>
                </select>
            </div>
            <div class="form-group">
                <label>Guests</label>
                <input type="number" id="guests" placeholder="e.g., 150" value="100">
            </div>
        </div>
        
        <div class="form-group">
            <label>Additional Notes</label>
            <textarea id="notes" placeholder="Any special requirements..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Preview (WhatsApp Message Format)</label>
            <textarea id="preview" readonly></textarea>
        </div>
        
        <button type="submit" id="submitBtn">🚀 Process & Send WhatsApp</button>
    </form>
    
    <div id="result" class="result"></div>
    
    <script>
        function generatePreview() {
            const event = document.getElementById('event').value;
            const client = document.getElementById('client').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const location = document.getElementById('location').value;
            const staffRequired = document.getElementById('staffRequired').value;
            const guests = document.getElementById('guests').value;
            const notes = document.getElementById('notes').value;
            
            const preview = `EVENT: ${event}
CLIENT: ${client}
DATE: ${date}
TIME: ${time}
LOCATION: ${location}
STAFF_REQUIRED: ${staffRequired}
GUESTS: ${guests}
${notes ? 'NOTES: ' + notes : ''}`;
            
            document.getElementById('preview').value = preview;
        }
        
        ['event', 'client', 'date', 'time', 'location', 'staffRequired', 'guests', 'notes'].forEach(id => {
            document.getElementById(id).addEventListener('input', generatePreview);
            document.getElementById(id).addEventListener('change', generatePreview);
        });
        
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';
            
            const bookingMsg = document.getElementById('preview').value;
            
            try {
                const response = await fetch('/process-booking-whatsapp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: bookingMsg })
                });
                
                const result = await response.json();
                
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                if (result.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = '✅ <strong>Booking Confirmed!</strong><br><br>' +
                        result.result.replace(/\n/g, '<br>');
                    document.getElementById('bookingForm').reset();
                    generatePreview();
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ Error: ' + (result.error || 'Processing failed');
                }
            } catch (error) {
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Error: ' + error.message;
            }
            
            btn.disabled = false;
            btn.textContent = '🚀 Process & Send WhatsApp';
        });
        
        generatePreview();
    </script>
</body>
</html>
