<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1f2937">
    <title>Event Check-In | Fresh People</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @media (max-width: 640px) {
            input, select, textarea, button { font-size: 16px !important; }
        }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .success-pulse { animation: successPulse 0.6s ease-out; }
        @keyframes successPulse { 0% { transform: scale(0.95); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .spinner { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div id="app" class="max-w-md mx-auto px-4 py-8">
        <!-- Loading State -->
        <div id="loading" class="text-center py-16">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-gray-400">Loading event...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden text-center py-16">
            <div class="text-6xl mb-4">⚠️</div>
            <h2 class="text-xl font-bold text-red-400 mb-2">Invalid Check-In</h2>
            <p id="errorMsg" class="text-gray-400">This check-in link is invalid or has expired.</p>
        </div>

        <!-- Event Info + Check-In Form -->
        <div id="checkinForm" class="hidden fade-in">
            <!-- Event Header -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600/20 text-blue-400 text-2xl mb-3">📋</div>
                <h1 class="text-2xl font-bold" id="eventName">Event Name</h1>
                <div class="mt-2 space-y-1 text-sm text-gray-400">
                    <p id="eventDate">📅 Date</p>
                    <p id="eventTime">🕐 Time</p>
                    <p id="eventLocation">📍 Location</p>
                </div>
            </div>

            <!-- Check-In Count -->
            <div class="bg-gray-800 rounded-xl p-4 mb-6 text-center">
                <p class="text-3xl font-bold text-blue-400" id="checkinCount">0</p>
                <p class="text-xs text-gray-500 mt-1">people checked in</p>
            </div>

            <!-- Form -->
            <form id="form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Your Name *</label>
                    <input type="text" id="personName" required
                        class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        placeholder="Enter your full name">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Type</label>
                    <select id="personType"
                        class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        <option value="guest">Guest</option>
                        <option value="staff">Staff</option>
                        <option value="vip">VIP</option>
                        <option value="media">Media</option>
                        <option value="vendor">Vendor</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Notes (optional)</label>
                    <input type="text" id="notes"
                        class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        placeholder="Any additional info">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-lg transition-colors flex items-center justify-center gap-2">
                    <span>Check In</span>
                </button>
            </form>
        </div>

        <!-- Success State -->
        <div id="success" class="hidden text-center py-12 success-pulse">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-600/20 text-green-400 text-4xl mb-4">✓</div>
            <h2 class="text-2xl font-bold text-green-400 mb-2">Checked In!</h2>
            <p id="successName" class="text-lg text-white mb-1">Name</p>
            <p id="successEvent" class="text-sm text-gray-400 mb-6">Event</p>
            <div class="bg-gray-800 rounded-xl p-4 inline-block">
                <p class="text-xs text-gray-500">Check-in time</p>
                <p id="successTime" class="text-sm text-gray-300">--:--</p>
            </div>
            <button onclick="resetForm()" class="mt-6 text-blue-400 hover:text-blue-300 text-sm font-medium">
                Check in another person →
            </button>
        </div>

        <!-- Feedback Form (shown after check-in) -->
        <div id="feedbackForm" class="hidden fade-in mt-6">
            <div class="bg-gray-800 rounded-xl p-5 border border-gray-700">
                <h3 class="font-semibold mb-3 text-center">💬 Rate Your Experience</h3>
                <div class="flex justify-center gap-2 mb-3" id="feedbackStars">
                    <button type="button" onclick="setFeedbackRating(1)" class="text-3xl text-gray-600 hover:text-yellow-400 transition-colors">★</button>
                    <button type="button" onclick="setFeedbackRating(2)" class="text-3xl text-gray-600 hover:text-yellow-400 transition-colors">★</button>
                    <button type="button" onclick="setFeedbackRating(3)" class="text-3xl text-gray-600 hover:text-yellow-400 transition-colors">★</button>
                    <button type="button" onclick="setFeedbackRating(4)" class="text-3xl text-gray-600 hover:text-yellow-400 transition-colors">★</button>
                    <button type="button" onclick="setFeedbackRating(5)" class="text-3xl text-gray-600 hover:text-yellow-400 transition-colors">★</button>
                </div>
                <input type="hidden" id="feedbackRating" value="0">
                <div class="mb-3">
                    <select id="feedbackCategory" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm">
                        <option value="general">General Feedback</option>
                        <option value="venue">Venue</option>
                        <option value="staff">Staff Service</option>
                        <option value="food">Food & Beverages</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="logistics">Logistics & Setup</option>
                    </select>
                </div>
                <textarea id="feedbackText" rows="3" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm placeholder-gray-500 mb-3" placeholder="Share your thoughts (optional)"></textarea>
                <button onclick="submitFeedback()" class="w-full py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg text-sm">Submit Feedback</button>
                <button onclick="skipFeedback()" class="w-full py-2 text-gray-500 hover:text-gray-400 text-xs mt-2">Skip</button>
            </div>
        </div>
    </div>

    <script>
        const checkCode = window.location.pathname.split('/checkin/')[1];
        const API = '';

        async function loadEvent() {
            try {
                const res = await fetch(`${API}/api/checkin/${checkCode}/event`);
                if (!res.ok) throw new Error('Invalid code');
                const data = await res.json();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('checkinForm').classList.remove('hidden');

                document.getElementById('eventName').textContent = data.event.event;
                document.getElementById('eventDate').textContent = '📅 ' + (data.event.date || 'TBD');
                document.getElementById('eventTime').textContent = '🕐 ' + (data.event.time || 'TBD');
                document.getElementById('eventLocation').textContent = '📍 ' + (data.event.location || 'TBD');
                document.getElementById('checkinCount').textContent = data.event.check_in_count || 0;
                currentEventId = data.event.id;
            } catch (e) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function resetForm() {
            document.getElementById('success').classList.add('hidden');
            document.getElementById('feedbackForm').classList.add('hidden');
            document.getElementById('checkinForm').classList.remove('hidden');
            document.getElementById('form').reset();
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').innerHTML = '<span>Check In</span>';
            loadEvent(); // Refresh count
        }

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>Checking in...</span>';

            try {
                const res = await fetch(`${API}/api/checkin/${checkCode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        person_name: document.getElementById('personName').value.trim(),
                        person_type: document.getElementById('personType').value,
                        notes: document.getElementById('notes').value.trim()
                    })
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('checkinForm').classList.add('hidden');
                    document.getElementById('success').classList.remove('hidden');
                    document.getElementById('feedbackForm').classList.remove('hidden');
                    document.getElementById('successName').textContent = data.person_name;
                    document.getElementById('successEvent').textContent = data.event;
                    document.getElementById('successTime').textContent = new Date(data.check_in_time).toLocaleString();
                    // Reset feedback form
                    feedbackRating = 0;
                    document.getElementById('feedbackRating').value = 0;
                    document.getElementById('feedbackText').value = '';
                    document.querySelectorAll('#feedbackStars button').forEach(btn => {
                        btn.classList.remove('text-yellow-400');
                        btn.classList.add('text-gray-600');
                    });
                } else {
                    alert(data.error || 'Check-in failed');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Check In</span>';
                }
            } catch (e) {
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<span>Check In</span>';
            }
        });

        // Load event on page load
        loadEvent();

        // ==================== FEEDBACK ====================
        let feedbackRating = 0;
        let currentEventId = null;

        function setFeedbackRating(val) {
            feedbackRating = val;
            document.getElementById('feedbackRating').value = val;
            const stars = document.querySelectorAll('#feedbackStars button');
            stars.forEach((btn, i) => {
                if (i < val) {
                    btn.classList.remove('text-gray-600');
                    btn.classList.add('text-yellow-400');
                } else {
                    btn.classList.remove('text-yellow-400');
                    btn.classList.add('text-gray-600');
                }
            });
        }

        async function submitFeedback() {
            const rating = parseInt(document.getElementById('feedbackRating').value) || 0;
            if (rating < 1) {
                // Allow skip
                skipFeedback();
                return;
            }
            try {
                await fetch(`${API}/api/events/${currentEventId}/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        attendee_name: document.getElementById('personName').value.trim(),
                        rating: rating,
                        feedback: document.getElementById('feedbackText').value.trim(),
                        category: document.getElementById('feedbackCategory').value
                    })
                });
            } catch (e) { /* silent fail for feedback */ }
            skipFeedback();
        }

        function skipFeedback() {
            document.getElementById('feedbackForm').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
        }
    </script>
</body>
</html>
