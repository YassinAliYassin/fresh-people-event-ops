<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f2937">
    <title>Login - Fresh People Event Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">🎉</div>
            <h1 class="text-3xl font-bold">Fresh People Event Ops</h1>
            <p class="text-gray-400 mt-2">Sign in to your account</p>
        </div>

        <div id="setupNotice" class="hidden bg-blue-900/50 border border-blue-700 rounded-lg p-4 mb-6 text-center">
            <p class="text-blue-300 text-sm">Welcome! Create your admin account to get started.</p>
        </div>

        <div id="loginForm" class="bg-gray-800 rounded-xl p-6 border border-gray-700">
            <div id="errorMsg" class="hidden bg-red-900/50 border border-red-700 rounded-lg p-3 mb-4 text-red-300 text-sm"></div>

            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Username</label>
                <input type="text" id="username" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="Enter username" autocomplete="username">
            </div>

            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-1">Password</label>
                <input type="password" id="password" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="Enter password" autocomplete="current-password">
            </div>

            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
                Sign In
            </button>

            <div id="loadingSpinner" class="hidden text-center mt-4">
                <div class="inline-block w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">Fresh People Event Operations &copy; 2026</p>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('sessionToken');
        if (token) {
            fetch('/api/auth/me', { headers: { 'x-session-token': token } })
                .then(r => { if (r.ok) window.location.href = '/'; })
                .catch(() => localStorage.removeItem('sessionToken'));
        }

        // Check if users exist (setup mode)
        fetch('/api/auth/users', { headers: token ? { 'x-session-token': token } : {} })
            .then(r => {
                if (r.status === 404 || r.redirected) {
                    document.getElementById('setupNotice').classList.remove('hidden');
                    document.querySelector('h1').textContent = 'Create Admin Account';
                    document.querySelector('p').textContent = document.querySelector('p').textContent.replace('Sign in', 'Register');
                    document.getElementById('loginBtn').textContent = 'Create Account';
                    window.isSetupMode = true;
                }
            })
            .catch(() => {});

        // Enter key submits
        document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
        document.getElementById('username').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('password').focus(); });

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loadingSpinner');
            const errorDiv = document.getElementById('errorMsg');

            if (!username || !password) {
                errorDiv.textContent = 'Please enter username and password';
                errorDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            spinner.classList.remove('hidden');
            errorDiv.classList.add('hidden');

            try {
                let res;
                if (window.isSetupMode) {
                    res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, display_name: username })
                    });
                } else {
                    res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                }

                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('sessionToken', data.token);
                    localStorage.setItem('userRole', data.role || 'admin');
                    localStorage.setItem('displayName', data.display_name || data.username || username);
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
